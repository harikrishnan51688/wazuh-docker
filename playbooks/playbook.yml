---
- hosts: docker_servers
  become: true

  tasks:
    - name: Update apt cache and install required packages
      apt:
        update_cache: yes
        pkg:
          - aptitude
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
          - python3-pip
          - python3-venv
          - python3-setuptools
          - git
          - make
        state: present

    - name: Create apt keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: yes

    - name: Remove old Docker repository file if present
      file:
        path: /etc/apt/sources.list.d/docker.list
        state: absent

    - name: Add Docker repository
      apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present

    - name: Install Docker Engine
      apt:
        update_cache: yes
        pkg:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: latest

    - name: Install Docker Python SDK
      apt:
        name: python3-docker
        state: present

    - name: Enable and start Docker
      service:
        name: docker
        enabled: yes
        state: started

    - name: Clone Wazuh Docker repository
      git:
        repo: https://github.com/harikrishnan51688/wazuh-docker.git
        dest: /opt/wazuh-docker
        version: main
        force: yes

    - name: Check if certificates already exist
      stat:
        path: /opt/wazuh-docker/single-node/config/wazuh_indexer_ssl_certs/admin.pem
      register: cert_file

    - name: Set sysctl vm.max_map_count
      community.general.make:
        chdir: /opt/wazuh-docker
        target: sysctl

    - name: Build certificates
      community.general.make:
        chdir: /opt/wazuh-docker
        target: certs
      when: not (cert_file.stat.isreg | default(false))

    - name: Start Wazuh
      community.general.make:
        chdir: /opt/wazuh-docker
        target: up

    - name: Show Docker containers
      command: docker ps
      register: docker_ps
      changed_when: false

    - name: Display running containers
      debug:
        var: docker_ps.stdout_lines
